name: Auto Release Addon Package

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Addon Zip
        run: |
          set -euo pipefail
          rm -rf dist

          build_package() {
            local flavor_name="$1"
            local toc_source="$2"
            local package_root="dist/package-${flavor_name}"
            local addon_dir="${package_root}/YouAreNowPrepared"
            local zip_name="YouAreNowPrepared-${flavor_name}-continuous.zip"

            rm -rf "$package_root"
            mkdir -p "$addon_dir/src"
            cp "$toc_source" "$addon_dir/YouAreNowPrepared.toc"
            cp README.md "$addon_dir/"
            cp LICENSE "$addon_dir/"
            cp src/*.lua "$addon_dir/src/"

            local version="continuous-${GITHUB_SHA:0:7}"
            sed -i "s/^## Version: .*/## Version: ${version}/" "$addon_dir/YouAreNowPrepared.toc"
            cd "$package_root"
            zip -r "../../${zip_name}" "YouAreNowPrepared"
            cd - >/dev/null
          }

          build_package "ClassicEra" "YouAreNowPrepared_Vanilla.toc"
          build_package "ClassicTBC" "YouAreNowPrepared_TBC.toc"

      - name: Publish Continuous Release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous Build
          body: |
            Automated prerelease package from `main`.
            Use this if you want the latest build without manual packaging.
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: YouAreNowPrepared-ClassicEra-continuous.zip,YouAreNowPrepared-ClassicTBC-continuous.zip
