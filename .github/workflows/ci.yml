name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check src spec

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Install Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install Busted
        run: luarocks install busted

      - name: Execute Test Suite
        run: |
          eval "$(luarocks path)"
          busted spec

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Addon Zips
        run: |
          set -euo pipefail
          rm -rf dist

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            build_channel="rc-pr${{ github.event.pull_request.number }}"
            build_version="${build_channel}-${GITHUB_SHA:0:7}"
          else
            build_channel="latest"
            build_version="latest-${GITHUB_SHA:0:7}"
          fi

          build_package() {
            local flavor_name="$1"
            local toc_source="$2"
            local package_root="dist/package-${flavor_name}"
            local addon_dir="${package_root}/YouAreNowPrepared"
            local zip_name="YouAreNowPrepared-${flavor_name}-${build_channel}.zip"

            rm -rf "$package_root"
            mkdir -p "$addon_dir/src"
            cp "$toc_source" "$addon_dir/YouAreNowPrepared.toc"
            cp README.md "$addon_dir/"
            cp LICENSE "$addon_dir/"
            cp src/*.lua "$addon_dir/src/"

            sed -i "s/^## Version: .*/## Version: ${build_version}/" "$addon_dir/YouAreNowPrepared.toc"
            cd "$package_root"
            zip -r "../../${zip_name}" "YouAreNowPrepared"
            cd - >/dev/null
          }

          build_package "ClassicEra" "YouAreNowPrepared_Vanilla.toc"
          build_package "ClassicTBC" "YouAreNowPrepared_TBC.toc"

      - name: Upload Classic Era RC Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: YouAreNowPrepared-ClassicEra-RC
          path: YouAreNowPrepared-ClassicEra-rc-pr*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Classic TBC RC Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: YouAreNowPrepared-ClassicTBC-RC
          path: YouAreNowPrepared-ClassicTBC-rc-pr*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish Latest Release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          body: |
            Automated latest package from `main`.
            This release is updated on every push to `main`.
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: YouAreNowPrepared-ClassicEra-latest.zip,YouAreNowPrepared-ClassicTBC-latest.zip
