name: Stable Release Addon Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Addon Zip
        run: |
          set -euo pipefail
          rm -rf dist
          version="${GITHUB_REF_NAME#v}"

          build_package() {
            local flavor_name="$1"
            local toc_source="$2"
            local package_root="dist/package-${flavor_name}"
            local addon_dir="${package_root}/YouAreNowPrepared"
            local zip_name="YouAreNowPrepared-${flavor_name}-gold-${GITHUB_REF_NAME}.zip"

            rm -rf "$package_root"
            mkdir -p "$addon_dir/src"
            cp "$toc_source" "$addon_dir/YouAreNowPrepared.toc"
            cp README.md "$addon_dir/"
            cp LICENSE "$addon_dir/"
            cp src/*.lua "$addon_dir/src/"

            sed -i "s/^## Version: .*/## Version: ${version}/" "$addon_dir/YouAreNowPrepared.toc"
            cd "$package_root"
            zip -r "../../${zip_name}" "YouAreNowPrepared"
            cd - >/dev/null
          }

          build_package "ClassicEra" "YouAreNowPrepared_Vanilla.toc"
          build_package "ClassicTBC" "YouAreNowPrepared_TBC.toc"

      - name: Publish Stable Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Gold ${{ github.ref_name }}
          generateReleaseNotes: true
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: YouAreNowPrepared-ClassicEra-gold-${{ github.ref_name }}.zip,YouAreNowPrepared-ClassicTBC-gold-${{ github.ref_name }}.zip
