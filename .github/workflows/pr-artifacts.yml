name: PR Release Candidate Artifacts

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pr-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Addon Zip Artifacts
        run: |
          set -euo pipefail
          rm -rf dist

          build_package() {
            local flavor_name="$1"
            local toc_source="$2"
            local package_root="dist/package-${flavor_name}"
            local addon_dir="${package_root}/YouAreNowPrepared"
            local zip_name="YouAreNowPrepared-${flavor_name}-rc-pr${{ github.event.pull_request.number || 'manual' }}-${GITHUB_SHA:0:7}.zip"

            rm -rf "$package_root"
            mkdir -p "$addon_dir/src"
            cp "$toc_source" "$addon_dir/YouAreNowPrepared.toc"
            cp README.md "$addon_dir/"
            cp LICENSE "$addon_dir/"
            cp src/*.lua "$addon_dir/src/"

            local version="rc-pr${{ github.event.pull_request.number || 'manual' }}-${GITHUB_SHA:0:7}"
            sed -i "s/^## Version: .*/## Version: ${version}/" "$addon_dir/YouAreNowPrepared.toc"

            cd "$package_root"
            zip -r "../../${zip_name}" "YouAreNowPrepared"
            cd - >/dev/null
          }

          build_package "ClassicEra" "YouAreNowPrepared_Vanilla.toc"
          build_package "ClassicTBC" "YouAreNowPrepared_TBC.toc"

      - name: Upload Classic Era RC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouAreNowPrepared-ClassicEra-RC
          path: YouAreNowPrepared-ClassicEra-rc-pr*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Classic TBC RC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouAreNowPrepared-ClassicTBC-RC
          path: YouAreNowPrepared-ClassicTBC-rc-pr*.zip
          if-no-files-found: error
          retention-days: 14
